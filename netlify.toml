[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Ces 3 clés sont marquées "secret" côté Netlify mais leurs valeurs
  # ("main", "mlahbabi/odyssee-rabat", "8247") apparaissent naturellement
  # dans le repo / metadata → faux positifs du scanner.
  # Seul GITHUB_TOKEN reste scanné.
  SECRETS_SCAN_OMIT_KEYS = "GITHUB_BRANCH,GITHUB_REPO,ADMIN_PIN"

[functions]
  node_bundler = "esbuild"

# L'admin n'est pas indexable — on renvoie 200 mais on met un header discourage
[[headers]]
  for = "/admin*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Referrer-Policy = "no-referrer"
    Cache-Control = "no-store"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
